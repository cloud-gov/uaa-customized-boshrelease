resource_types:
- name: github-release
  type: registry-image
  source:
    aws_access_key_id: ((ecr_aws_key))
    aws_secret_access_key: ((ecr_aws_secret))
    repository: github-release-resource
    aws_region: us-gov-west-1
    tag: latest

- name: git
  type: registry-image
  source:
    aws_access_key_id: ((ecr_aws_key))
    aws_secret_access_key: ((ecr_aws_secret))
    repository: git-resource
    aws_region: us-gov-west-1
    tag: latest

resources:
- name: uaa-release
  type: github-release
  icon: github
  source:
    owner: cloudfoundry
    repository: uaa-release
    pre_release: false


- name: uaa-customized-boshrelease
  type: git
  icon: github
  source:
    uri: https://github.com/cloud-gov/uaa-customized-boshrelease
    branch: v2


jobs:
- name: process-new-uaa-release
  public: true
  plan:
  - get: uaa-release
    trigger: true
  - get: uaa-customized-boshrelease
    trigger: true  #take out later
  - task: pull-submodules-and-prepare-source
    config:
      platform: linux

      image_resource:
        type: registry-image
        source:
          aws_access_key_id: ((ecr_aws_key))
          aws_secret_access_key: ((ecr_aws_secret))
          repository: general-task
          aws_region: us-gov-west-1
          tag: latest

      inputs:
      - name: uaa-release

      outputs:
      - name: uaa-release-source-repo

      run:
        path: sh
        args:
        - -ce
        - |
          set -x

          echo "--- Reading version from resource ---"
          VERSION=$(cat uaa-release/version)
          echo "Detected version: ${VERSION}"

          echo "--- Cloning repository and checking out tag v${VERSION} ---"
          git clone https://github.com/cloudfoundry/uaa-release.git uaa-release-source-repo

          cd uaa-release-source-repo
          git checkout "tags/v${VERSION}"

          echo "--- Initializing Git submodules (this will populate src/uaa) ---"
          git submodule update --init --recursive

          echo "--- Verifying that src/uaa is populated ---"
          ls -al src/uaa

  - task: merge-uaa-customized
    params:
      PRIVATE_YML_CONTENT: |-
        ---
        blobstore:
          options:
            region: us-gov-west-1
            bucket_name: cloud-gov-release-blobstore
            credentials_source: env_or_profile
            server_side_encryption: AES256
    config:
      platform: linux
      image_resource:
        type: registry-image
        source:
          aws_access_key_id: ((ecr_aws_key))
          aws_secret_access_key: ((ecr_aws_secret))
          repository: general-task
          aws_region: us-gov-west-1
          tag: latest
      inputs:
      - name: uaa-release
      - name: uaa-release-source-repo
      - name: uaa-customized-boshrelease
      outputs:
      - name: final-source 
      - name: finalized-release
      run:
        path: sh
        args:
        - -ce
        - |
          set -x
          
          echo "--- Preparing final-source directory ---"
          # Copy the clean, prepared source into our output directory to start.
          # The `/.` is important to copy the contents, not the folder itself.
          cp -a uaa-release-source-repo/. final-source/
          
          echo "--- Overlay uaa-customized files ---"
          cp -rv uaa-customized-boshrelease/jobs/uaa-customized/templates/web/* final-source/src/uaa/server/src/main/resources/templates/web
          cp -rv uaa-customized-boshrelease/jobs/uaa-customized/templates/resources/oss/stylesheets/* final-source/src/uaa/uaa/src/main/webapp/resources/oss/stylesheets 
          cp -rv uaa-customized-boshrelease/jobs/uaa-customized/templates/resources/javascripts/* final-source/src/uaa/uaa/src/main/webapp/resources/javascripts
          cp -rv uaa-customized-boshrelease/config/final.yml final-source/config/final.yml

          # Create release
          export AWS_USE_FIPS_ENDPOINT=false
          export UAA_VERSION=$(cat uaa-release/version)

          pushd final-source

          pushd uaa-release
          bosh create-release --force --tarball="./uaa-customized-${UAA_VERSION}.tgz" --version=${UAA_VERSION}

          #mv "uaa-customized-${UAA_VERSION}.tgz" "../finalized-release/uaa-customized-${UAA_VERSION}.tgz"

          cat <<EOF > "config/private.yml"
          $PRIVATE_YML_CONTENT
          EOF


          exit 1 #keep container around for debugging for now