resource_types:
- name: github-release
  type: registry-image
  source:
    aws_access_key_id: ((ecr_aws_key))
    aws_secret_access_key: ((ecr_aws_secret))
    repository: github-release-resource
    aws_region: us-gov-west-1
    tag: latest
- name: git
  type: registry-image
  source:
    aws_access_key_id: ((ecr_aws_key))
    aws_secret_access_key: ((ecr_aws_secret))
    repository: git-resource
    aws_region: us-gov-west-1
    tag: latest
- name: s3-iam
  source:
    aws_access_key_id: ((ecr_aws_key))
    aws_region: us-gov-west-1
    aws_secret_access_key: ((ecr_aws_secret))
    repository: s3-resource
    tag: latest
  type: registry-image

resources:
- name: uaa-release
  type: github-release
  icon: github
  source:
    owner: cloudfoundry
    repository: uaa-release
    pre_release: false
    check_every: 30m
- name: uaa-customized-boshrelease
  type: git
  icon: github
  source:
    uri: https://github.com/cloud-gov/uaa-customized-boshrelease
    branch: main
- name: uaa-customized-final-builds-dir-tarball
  source:
    bucket: cloud-gov-bosh-releases
    check_every: never
    endpoint: s3-fips.us-gov-west-1.amazonaws.com
    region_name: us-gov-west-1
    server_side_encryption: AES256
    versioned_file: final-builds-dir-uaa-customized.tgz
  type: s3-iam
- name: uaa-customized-releases-dir-tarball
  source:
    bucket: cloud-gov-bosh-releases
    check_every: never
    endpoint: s3-fips.us-gov-west-1.amazonaws.com
    region_name: us-gov-west-1
    server_side_encryption: AES256
    versioned_file: releases-dir-uaa-customized.tgz
  type: s3-iam
- name: uaa-customized-release-tarball
  source:
    bucket: cloud-gov-bosh-releases
    check_every: never
    endpoint: s3-fips.us-gov-west-1.amazonaws.com
    regexp: uaa-customized-(.*).tgz
    region_name: us-gov-west-1
    server_side_encryption: AES256
  type: s3-iam
- name: bosh-release
  type: s3-iam
  source:
    bucket: ((s3-bosh-releases-bucket))
    region_name: ((aws-region))
    regexp: uaa-customized-([\d\.]*).tgz
    server_side_encryption: AES256
- name: general-task
  type: registry-image
  source:
    aws_access_key_id: ((ecr_aws_key))
    aws_secret_access_key: ((ecr_aws_secret))
    repository: general-task
    aws_region: ((aws-region))
    tag: latest

jobs:

- name: set-self
  plan:
    - get: uaa-customized-boshrelease
      trigger: true
      params: {depth: 1}
    - set_pipeline: self
      file: uaa-customized-boshrelease/ci/pipeline.yml

- name: process-new-uaa-release
  plan:
  - in_parallel:
      steps:
      - get: uaa-release
        trigger: true
      - get: uaa-customized-boshrelease
      - get: final-builds-dir-tarball
        resource: uaa-customized-final-builds-dir-tarball
      - get: releases-dir-tarball
        resource: uaa-customized-releases-dir-tarball
  - task: pull-submodules-and-prepare-source
    config:
      platform: linux

      image_resource:
        type: registry-image
        source:
          aws_access_key_id: ((ecr_aws_key))
          aws_secret_access_key: ((ecr_aws_secret))
          repository: general-task
          aws_region: us-gov-west-1
          tag: latest
      inputs:
      - name: uaa-release
      outputs:
      - name: uaa-release-source-repo
      run:
        path: sh
        args:
        - -ce
        - |
          set -x

          echo "--- Reading version from resource ---"
          VERSION=$(cat uaa-release/version)
          echo "Detected version: ${VERSION}"

          echo "--- Cloning repository and checking out tag v${VERSION} ---"
          git clone https://github.com/cloudfoundry/uaa-release.git uaa-release-source-repo

          cd uaa-release-source-repo
          git checkout "tags/v${VERSION}"

          echo "--- Initializing Git submodules (this will populate src/uaa) ---"
          git submodule update --init --recursive

          echo "--- Verifying that src/uaa is populated ---"
          ls -al src/uaa

  - task: merge-uaa-customized
    tags: [iaas]
    config:
      platform: linux
      image_resource:
        type: registry-image
        source:
          aws_access_key_id: ((ecr_aws_key))
          aws_secret_access_key: ((ecr_aws_secret))
          repository: general-task
          aws_region: us-gov-west-1
          tag: latest
      inputs:
      - name: uaa-release
      - name: uaa-release-source-repo
      - name: uaa-customized-boshrelease
      - name: final-builds-dir-tarball
      - name: releases-dir-tarball
      outputs:
      - name: release-git-repo 
      - name: finalized-release
      run:
        path: sh
        args:
        - -ce
        - |
          set -x
          
          echo "--- Preparing release-git-repo directory ---"
          # Copy the clean, prepared source into our output directory to start.
          # The `/.` is important to copy the contents, not the folder itself.
          cp -a uaa-release-source-repo/. release-git-repo/
          
          echo "--- Overlay uaa-customized files ---"
          cp -rv uaa-customized-boshrelease/jobs/uaa-customized/templates/web/* release-git-repo/src/uaa/server/src/main/resources/templates/web
          cp -rv uaa-customized-boshrelease/jobs/uaa-customized/templates/resources/oss/stylesheets/* release-git-repo/src/uaa/uaa/src/main/webapp/resources/oss/stylesheets 
          cp -rv uaa-customized-boshrelease/jobs/uaa-customized/templates/resources/javascripts/* release-git-repo/src/uaa/uaa/src/main/webapp/resources/javascripts
          cp -rv uaa-customized-boshrelease/config/final.yml release-git-repo/config/final.yml

          # Filter .mil and .gov addresses for Login.gov - Not doing this for now after talking with Cyber Security
          # cp -rv uaa-customized-boshrelease/jobs/uaa-customized/templates/java/org/cloudfoundry/indentity/uaa/provider/oauth/* uaa-release/src/uaa/server/src/main/java/org/cloudfoundry/identity/uaa/provider/oauth/

          export AWS_USE_FIPS_ENDPOINT=false
          export UAA_VERSION=$(cat uaa-release/version)

          cd release-git-repo
          RELEASE_NAME=$(grep final_name config/final.yml | awk '{print $2}')
          
          echo "--- Moving the original uaa releases folder out of the way ---"
          mv releases releases.uaa  

          tar -zxf "../final-builds-dir-tarball/final-builds-dir-${RELEASE_NAME}.tgz"
          tar -zxf "../releases-dir-tarball/releases-dir-${RELEASE_NAME}.tgz"

          echo "--- Create dev release ---"
          bosh-cli -n create-release --force --tarball="./${RELEASE_NAME}.tgz" --version="${UAA_VERSION}"
          
          mv "${RELEASE_NAME}.tgz" "../finalized-release/${RELEASE_NAME}-${UAA_VERSION}.tgz"
          
          tar -czhf "../finalized-release/final-builds-dir-${RELEASE_NAME}.tgz" .final_builds
          
          echo "--- Turning dev release into final release ---"
          tar -czhf "../finalized-release/releases-dir-${RELEASE_NAME}.tgz" releases

  - in_parallel:
      steps:
      - params:
          file: finalized-release/uaa-customized-*.tgz
        put: uaa-customized-release-tarball
        tags:
        - iaas
      - params:
          file: finalized-release/final-builds-dir-uaa-customized.tgz
        put: uaa-customized-final-builds-dir-tarball
        tags:
        - iaas
      - params:
          file: finalized-release/releases-dir-uaa-customized.tgz
        put: uaa-customized-releases-dir-tarball
        tags:
        - iaas


- name: upload-bosh-release-tooling
  plan:
  - in_parallel:
    - get: bosh-release
      trigger: true
    - get: general-task
  - task: upload-releases
    config:
      platform: linux
      image_resource:
        type: registry-image
        source:
          aws_access_key_id: ((ecr_aws_key))
          aws_secret_access_key: ((ecr_aws_secret))
          repository: general-task
          aws_region: ((aws-region))
          tag: latest
      inputs:
      - {name: bosh-release, path: releases/uaa-customized}
      params:
        BOSH_CA_CERT: ((bosh-director-info.tooling.ca_cert))
        BOSH_CLIENT: ((bosh-director-info.tooling.client))
        BOSH_CLIENT_SECRET: ((bosh-director-info.tooling.client_secret))
        BOSH_ENVIRONMENT: ((bosh-director-info.tooling.environment))
      run:
        path: sh
        args:
        - -exc
        - |
          for release in releases/**/*.tgz; do
            echo "Uploading release ${release}"
            bosh upload-release "${release}"
          done
          bosh -n clean-up

- name: upload-bosh-release-development
  plan:
  - in_parallel:
    - get: bosh-release
      trigger: true
